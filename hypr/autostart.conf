#################
### AUTOSTART ###
#################

# Optimized staggered startup for better performance
# Phase 1: Critical components (immediate)
exec-once = nohup quickshell &
exec-once = hyprpolkitagent

# Phase 2: Essential services (250ms delay)
exec-once = sleep 0.25 && awww-daemon
exec-once = sleep 0.25 && dbus-update-activation-environment --systemd WAYLAND_DISPLAY XDG_CURRENT_DESKTOP

# Phase 2.5: Restore last wallpaper (after awww-daemon is ready)
exec-once = sleep 1.5 && bash -c 'wp=$(cat ~/.config/quickshell/last-wallpaper 2>/dev/null); [ -n "$wp" ] && [ -f "$wp" ] && awww img "$wp"'

# Phase 3: User-facing services (500ms delay)
exec-once = sleep 0.5 && mako
exec-once = sleep 0.5 && hypridle

# Phase 4: Background services (1s delay)
exec-once = sleep 1 && wl-paste --watch cliphist store
exec-once = sleep 1 wl-paste --type text --watch cliphist store
exec-once = sleep 1 wl-paste --type image --watch cliphist store
exec-once = sleep 1 && ~/.config/quickshell/monitor-change-handler.sh

exec-once = ~/.local/bin/watch_apps.sh
